name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-linux-appimage.yml"
      - "installer/build-appimage-v2.sh"
      - "installer/linux/**"
      - "OnionHop/Directory.Packages.props"
      - "OnionHop/OnionHopV2.sln"
      - "OnionHop/src/**"

permissions:
  contents: read

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Make build scripts executable
        run: |
          chmod +x installer/build-appimage-v2.sh
          chmod +x installer/linux/AppRun

      - name: Build AppImage
        run: ./installer/build-appimage-v2.sh

      - name: Capture output metadata
        id: artifact_meta
        shell: bash
        run: |
          appimage_path="$(find installer/output -maxdepth 1 -type f -name 'OnionHopV2-*-linux-x86_64.AppImage' | head -n 1)"
          if [[ -z "$appimage_path" ]]; then
            echo "AppImage output was not found." >&2
            exit 1
          fi

          sha256sum "$appimage_path" | tee "${appimage_path}.sha256"
          artifact_name="$(basename "$appimage_path" .AppImage)"

          echo "appimage_path=$appimage_path" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

          {
            echo "### Linux AppImage"
            echo
            echo "- File: \`$(basename "$appimage_path")\`"
            echo "- SHA256: \`$(cut -d' ' -f1 "${appimage_path}.sha256")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.artifact_name }}
          path: |
            ${{ steps.artifact_meta.outputs.appimage_path }}
            ${{ steps.artifact_meta.outputs.appimage_path }}.sha256
          if-no-files-found: error
          retention-days: 14
